name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @repo/config build
          pnpm --filter @repo/contracts build
          pnpm --filter @repo/core build
          pnpm --filter @repo/server build
          pnpm --filter @repo/web build

      - name: Install 7-Zip for Squirrel (Windows only)
        if: runner.os == 'Windows'
        run: |
          choco install 7zip --no-progress
          $7zPath = "C:\Program Files\7-Zip\7z.exe"
          # Find the real electron-winstaller location (pnpm uses content-addressed store)
          $winstallerPath = (Get-ChildItem -Path . -Recurse -Filter "electron-winstaller" -Directory | Where-Object { Test-Path "$($_.FullName)/vendor" } | Select-Object -First 1).FullName
          if (-not $winstallerPath) {
            $winstallerPath = "apps/desktop/node_modules/electron-winstaller"
          }
          $vendorPath = "$winstallerPath/vendor"
          New-Item -ItemType Directory -Force -Path $vendorPath
          Copy-Item $7zPath "$vendorPath/7z.exe" -Force
          Write-Host "Copied 7z.exe to: $vendorPath"

      - name: Make desktop app
        run: pnpm --filter @repo/desktop make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: apps/desktop/out/make/
