name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @repo/config build
          pnpm --filter @repo/contracts build
          pnpm --filter @repo/core build
          pnpm --filter @repo/server build
          pnpm --filter @repo/web build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Package desktop app
        run: pnpm --filter @repo/desktop package

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run desktop smoke test
        run: xvfb-run pnpm --filter @repo/desktop test:e2e
        env:
          ELECTRON_DISABLE_SANDBOX: 1
          DISPLAY: ':99'
